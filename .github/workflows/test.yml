name: 🧪 E2E Tests + Guardrails

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      backend:
        image: node:18
        options: |
          -w /app
          -v ${{ github.workspace }}/todo-app/backend:/app
        ports:
          - 3000:3000
        env:
          PORT: 3000

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Backend Dependencies
        working-directory: ./todo-app/backend
        run: npm ci

      - name: Start Backend Server
        working-directory: ./todo-app/backend
        run: npm start &
        env:
          PORT: 3000

      - name: Wait for Backend
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000/api/health; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 1
          done
          exit 1

      - name: Install Frontend Dependencies
        working-directory: ./todo-app/frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./todo-app/frontend
        run: npm run build

      - name: Start Frontend (serve build)
        working-directory: ./todo-app/frontend
        run: |
          npx serve -s build -l 4100 &
          sleep 3

      - name: Install Test Dependencies
        working-directory: ./todo-app-tests
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./todo-app-tests
        run: npx playwright install chromium

      - name: Run Functional Tests (5 tests)
        working-directory: ./todo-app-tests
        run: npx playwright test tests/functional-tests.spec.js --reporter=json --reporter=html

      - name: Run Guardrail Tests (2 tests)
        working-directory: ./todo-app-tests
        run: npx playwright test tests/guardrail-tests.spec.js --reporter=json --reporter=html

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: todo-app-tests/playwright-report/
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Test Results**
              
              - 🧪 E2E Tests: See artifacts for detailed report
              - 🛡️  Guardrails: Safety & performance bounds validated
              - 📊 Full report: Check Actions tab
              `
            })
