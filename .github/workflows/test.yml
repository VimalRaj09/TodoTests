name: 🧪 E2E Tests + Guardrails

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Tests Repo
        uses: actions/checkout@v3

      - name: Checkout App Repo (TodoAPP)
        uses: actions/checkout@v3
        with:
          repository: VimalRaj09/TodoAPP
          path: todo-app

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        working-directory: ./todo-app/backend
        run: npm ci

      - name: Start Backend Server
        working-directory: ./todo-app/backend
        run: |
          npm start > backend.log 2>&1 &
          echo $! > backend.pid
          sleep 3
        env:
          PORT: 3000

      - name: Wait for Backend
        run: |
          echo "🔍 Checking backend status..."
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✅ Backend is ready!"
              exit 0
            fi
            echo "⏳ Attempt $i/30..."
            sleep 1
          done
          echo "❌ Backend failed to start"
          cat ./todo-app/backend/backend.log || echo "No log file"
          exit 1

      - name: Install Frontend Dependencies
        working-directory: ./todo-app/frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./todo-app/frontend
        run: npm run build 2>&1 || (echo "Build failed"; cat npm-debug.log 2>/dev/null || echo "No debug log"; exit 1)

      - name: Start Frontend (serve build)
        working-directory: ./todo-app/frontend
        run: |
          npx serve -s build -l 4100 > frontend.log 2>&1 &
          echo $! > frontend.pid
          sleep 4
          echo "✅ Frontend started"

      - name: Install Test Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Run Functional Tests (5 tests)
        run: npx playwright test tests/functional-tests.spec.js --reporter=json --reporter=html || (echo "Tests failed"; cat test-results/* 2>/dev/null || true; exit 1)

      - name: Run Guardrail Tests (2 tests)
        run: npx playwright test tests/guardrail-tests.spec.js --reporter=json --reporter=html || (echo "Guardrails failed"; exit 1)

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Test Results**
              
              - 🧪 E2E Tests (5): Functional testing
              - 🛡️ Guardrails (2): Safety & performance bounds
              - 📊 Full report: Check Actions tab
              `
            })
