name: 🧪 E2E Tests + Guardrails

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Tests Repo
        uses: actions/checkout@v3
        with:
          path: test-repo

      - name: Checkout App Repo
        uses: actions/checkout@v3
        with:
          repository: VimalRaj09/TodoAPP
          path: app-repo

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      # Backend Setup
      - name: Install Backend Dependencies
        working-directory: ./app-repo/backend
        run: npm ci

      - name: Start Backend
        working-directory: ./app-repo/backend
        run: |
          echo "Starting backend server..."
          npm start > backend.log 2>&1 &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"
          sleep 2

      - name: Verify Backend Health
        run: |
          echo "Checking backend health..."
          for i in {1..30}; do
            echo "Attempt $i/30..."
            if curl -s http://localhost:3000/api/health 2>/dev/null | grep -q "ok"; then
              echo "✅ Backend is running!"
              curl -s http://localhost:3000/api/health
              exit 0
            fi
            sleep 1
          done
          echo "❌ Backend health check failed after 30 seconds"
          echo "Backend log:"
          cat ./app-repo/backend/backend.log || echo "Log file not found"
          exit 1

      # Frontend Setup
      - name: Install Frontend Dependencies
        working-directory: ./app-repo/frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./app-repo/frontend
        run: npm run build
        env:
          CI: false
          GENERATE_SOURCEMAP: false

      - name: Start Frontend Server
        working-directory: ./app-repo/frontend
        run: |
          echo "Starting frontend server on port 4100..."
          npx serve -s build -l 4100 > frontend.log 2>&1 &
          FRONTEND_PID=$!
          echo "Frontend PID: $FRONTEND_PID"
          sleep 2

      - name: Verify Frontend Health
        run: |
          echo "Checking frontend health..."
          for i in {1..30}; do
            echo "Attempt $i/30..."
            if curl -s http://localhost:4100/ 2>/dev/null | grep -q "React"; then
              echo "✅ Frontend is running!"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Frontend health check failed after 30 seconds"
          echo "Frontend log:"
          cat ./app-repo/frontend/frontend.log || echo "Log file not found"
          exit 1

      # Test Execution
      - name: Install Test Dependencies
        working-directory: ./test-repo
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./test-repo
        run: npx playwright install --with-deps chromium

      - name: Run Functional Tests
        working-directory: ./test-repo
        run: |
          echo "🧪 Running 5 functional tests..."
          npx playwright test tests/functional-tests.spec.js \
            --reporter=html \
            --reporter=list \
            2>&1 | tee test-functional.log || EXIT_CODE=$?
          echo "Functional tests exit code: ${EXIT_CODE:-0}"
        continue-on-error: true

      - name: Run Guardrail Tests
        working-directory: ./test-repo
        run: |
          echo "🛡️ Running 2 guardrail tests..."
          npx playwright test tests/guardrail-tests.spec.js \
            --reporter=html \
            --reporter=list \
            2>&1 | tee test-guardrail.log || EXIT_CODE=$?
          echo "Guardrail tests exit code: ${EXIT_CODE:-0}"
        continue-on-error: true

      - name: Show Test Logs on Failure
        if: failure()
        run: |
          echo "=== Functional Test Log ==="
          cat ./test-repo/test-functional.log || echo "No functional test log"
          echo ""
          echo "=== Guardrail Test Log ==="
          cat ./test-repo/test-guardrail.log || echo "No guardrail test log"
          echo ""
          echo "=== Backend Log ==="
          cat ./app-repo/backend/backend.log || echo "No backend log"
          echo ""
          echo "=== Frontend Log ==="
          cat ./app-repo/frontend/frontend.log || echo "No frontend log"

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-repo/playwright-report/
          retention-days: 30

      - name: Test Summary
        if: always()
        run: |
          echo "✅ Test run complete"
          echo "📊 Check artifacts for detailed HTML report"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Test Results
              
              - ✅ 5 Functional Tests
              - 🛡️ 2 Guardrail Tests
              
              📊 See artifacts for detailed HTML report`
            })
