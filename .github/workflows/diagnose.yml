name: 🔍 Diagnose CI Issues

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Tests Repo
        uses: actions/checkout@v3

      - name: Checkout App Repo (TodoAPP)
        uses: actions/checkout@v3
        with:
          repository: VimalRaj09/TodoAPP
          path: todo-app

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: List directories
        run: |
          echo "📁 Directory structure:"
          ls -la
          echo ""
          echo "📁 todo-app contents:"
          ls -la todo-app/
          echo ""
          echo "📁 todo-app/backend:"
          ls -la todo-app/backend/
          echo ""
          echo "📁 todo-app/frontend:"
          ls -la todo-app/frontend/

      - name: Check package.json files
        run: |
          echo "📦 Backend package.json:"
          cat todo-app/backend/package.json
          echo ""
          echo "📦 Frontend package.json:"
          cat todo-app/frontend/package.json

      - name: Install Backend Dependencies (verbose)
        working-directory: ./todo-app/backend
        run: |
          echo "📥 Installing backend dependencies..."
          npm ci --verbose 2>&1 | head -50
          echo "✅ Backend deps installed"
          npm list --depth=0

      - name: Start Backend (with logging)
        working-directory: ./todo-app/backend
        run: |
          echo "🚀 Starting backend..."
          npm start > backend.log 2>&1 &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"
          sleep 5
          echo "📋 Backend logs:"
          cat backend.log || echo "No log file"

      - name: Test backend health endpoint
        run: |
          echo "🏥 Testing backend..."
          for i in {1..10}; do
            echo "Attempt $i..."
            curl -v http://localhost:3000/api/health || true
            sleep 1
          done

      - name: Install Frontend Dependencies (verbose)
        working-directory: ./todo-app/frontend
        run: |
          echo "📥 Installing frontend dependencies..."
          npm ci --verbose 2>&1 | head -50
          npm list --depth=0

      - name: Test Frontend Build
        working-directory: ./todo-app/frontend
        run: |
          echo "🔨 Building frontend..."
          npm run build 2>&1 || (echo "❌ Build failed"; exit 1)
          echo "✅ Frontend built successfully"

      - name: Check build output
        working-directory: ./todo-app/frontend
        run: |
          echo "📁 Build directory:"
          ls -la build/ || echo "No build directory"
